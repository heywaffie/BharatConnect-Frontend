server:
  port: 8080

spring:
  application:
    name: bharatlink-backend

  datasource:
    url: jdbc:h2:mem:bharatlink;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  admin:
    email: ${APP_ADMIN_EMAIL:ashokvibes@gmail.com}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
